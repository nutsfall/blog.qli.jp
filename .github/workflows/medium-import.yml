name: Import Medium Posts and Build Hugo

on:
  schedule:
    # 日曜日の15時 (UTC 6時 = JST 15時)
    - cron: "0 6 * * 0"
  workflow_dispatch:

env:
  HUGO_VERSION: "0.160.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Hugo
        run: |
          wget -O hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Setup Python for custom scripts
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install feedparser requests beautifulsoup4 markdownify python-dateutil

      - name: Create scripts directory and fetcher script
        run: |
          mkdir -p scripts/logs
          cat > scripts/fetch_medium_posts.py << 'PYTHON_EOF'
          #!/usr/bin/env python3
          import feedparser
          import requests
          import os
          import json
          import uuid
          from datetime import datetime, timedelta
          from bs4 import BeautifulSoup
          from markdownify import markdownify as md
          import re
          from urllib.parse import urlparse

          def fetch_recent_posts(username="hiro", days_back=7):
              """Mediumから最近の記事を取得"""
              feed_url = f"https://medium.com/feed/@{username}"
              
              try:
                  print(f"Fetching feed from: {feed_url}")
                  feed = feedparser.parse(feed_url)
                  
                  if not feed.entries:
                      print("No posts found in feed")
                      return []
                  
                  recent_posts = []
                  cutoff_date = datetime.now() - timedelta(days=days_back)
                  
                  for entry in feed.entries:
                      post_date = datetime(*entry.published_parsed[:6])

                      if post_date > cutoff_date:
                          # タグ情報を取得
                          tags = []
                          if hasattr(entry, 'tags'):
                              tags = [tag.term for tag in entry.tags]

                          recent_posts.append({
                              'title': entry.title,
                              'link': entry.link,
                              'published': post_date.isoformat(),
                              'published_date': post_date,
                              'summary': entry.summary,
                              'content': entry.get('content', [{}])[0].get('value', ''),
                              'guid': entry.guid,
                              'tags': tags
                          })
                          print(f"Found recent post: {entry.title} (tags: {', '.join(tags) if tags else 'none'})")
                  
                  return recent_posts
                  
              except Exception as e:
                  print(f"Error fetching feed: {e}")
                  return []

          def clean_medium_content(html_content, title=None):
              """MediumのHTMLコンテンツをクリーンアップ"""
              if not html_content:
                  return ""

              soup = BeautifulSoup(html_content, 'html.parser')

              for element in soup.find_all(['script', 'style', 'noscript']):
                  element.decompose()

              # Mediumのトラッキングピクセルを削除
              for img in soup.find_all('img', src=lambda s: s and 'medium.com/_/stat' in s):
                  img.decompose()

              for figure in soup.find_all('figure'):
                  figcaption = figure.find('figcaption')
                  if figcaption:
                      figcaption.name = 'p'
                      figcaption['class'] = 'caption'

              markdown_content = md(str(soup), heading_style="ATX")
              markdown_content = re.sub(r'\n\s*\n\s*\n', '\n\n', markdown_content)

              # 冒頭のタイトル重複見出しを削除
              if title:
                  markdown_content = re.sub(r'^#{1,3} ' + re.escape(title) + r'\s*\n', '', markdown_content)

              return markdown_content.strip()

          def generate_date_based_directory(post_date):
              """日付ベース（YYYYMM/UUID）のディレクトリ名を生成"""
              uuid_part = str(uuid.uuid4())
              date_prefix = post_date.strftime('%Y%m')
              return f"{date_prefix}/{uuid_part}", uuid_part

          def create_hugo_post(post, output_dir):
              """Hugo用の記事ファイルを作成"""
              try:
                  title = post['title']
                  post_date = post['published_date']
                  directory_name, uuid_slug = generate_date_based_directory(post_date)
                  date_iso = post['published']
                  content = clean_medium_content(post['content'], title=title)

                  # ディレクトリ名は YYYYMM/UUID、slugはUUIDのみ
                  post_dir = os.path.join(output_dir, directory_name)
                  os.makedirs(post_dir, exist_ok=True)
                  
                  # Front matterを文字列で作成（YAMLエラー回避）
                  frontmatter = '---\n'
                  frontmatter += f'title: "{title}"\n'
                  frontmatter += f'date: "{date_iso}"\n'
                  frontmatter += f'slug: "{uuid_slug}"\n'
                  frontmatter += 'source: "medium"\n'
                  frontmatter += f'original_url: "{post["link"]}"\n'

                  # タグを追加（インライン配列形式）
                  if post.get('tags'):
                      # タグ内の特殊文字をエスケープ
                      safe_tags = [tag.replace('"', '\\"') for tag in post['tags']]
                      tags_str = ', '.join([f'"{tag}"' for tag in safe_tags])
                      frontmatter += f'tags: [{tags_str}]\n'
                  else:
                      frontmatter += 'tags: []\n'

                  frontmatter += 'draft: false\n'
                  frontmatter += '---\n\n'
                  
                  with open(os.path.join(post_dir, 'index.md'), 'w', encoding='utf-8') as f:
                      f.write(frontmatter + content)
                  
                  print(f"Created post: {post_dir}/index.md")
                  print(f"  Directory: {directory_name}")
                  print(f"  Slug: {uuid_slug}")
                  return True, directory_name, uuid_slug
                  
              except Exception as e:
                  print(f"Error creating post for '{post['title']}': {e}")
                  return False, None, None

          def main():
              print("=== Medium Post Fetcher (Directory: YYYYMM/UUID, Slug: UUID) ===")

              username = "hiro"
              days_back = 7
              output_dir = "content/posts"
              
              os.makedirs(output_dir, exist_ok=True)
              
              posts = fetch_recent_posts(username, days_back)
              
              if not posts:
                  print("No recent posts found")
                  return
              
              print(f"Found {len(posts)} recent posts")
              
              success_count = 0
              imported_posts = []
              
              for post in posts:
                  success, directory_name, uuid_slug = create_hugo_post(post, output_dir)
                  if success:
                      success_count += 1
                      imported_posts.append({
                          'title': post['title'],
                          'url': post['link'],
                          'directory': directory_name,
                          'slug': uuid_slug,
                          'date': post['published']
                      })
              
              print(f"Successfully imported {success_count}/{len(posts)} posts")
              
              summary = {
                  'import_date': datetime.now().isoformat(),
                  'posts_found': len(posts),
                  'posts_imported': success_count,
                  'posts': imported_posts
              }
              
              # scripts/logsディレクトリに保存
              with open('scripts/logs/medium_import_summary.json', 'w', encoding='utf-8') as f:
                  json.dump(summary, f, ensure_ascii=False, indent=2)

          if __name__ == '__main__':
              main()
          PYTHON_EOF

      - name: Fetch new Medium posts
        run: |
          python scripts/fetch_medium_posts.py

      - name: Check for new posts
        id: check_posts
        run: |
          if [ -f "scripts/logs/medium_import_summary.json" ]; then
            POSTS_COUNT=$(jq '.posts_imported' scripts/logs/medium_import_summary.json)
            echo "posts_count=$POSTS_COUNT" >> $GITHUB_OUTPUT
            
            if [ "$POSTS_COUNT" -gt 0 ]; then
              echo "has_new_posts=true" >> $GITHUB_OUTPUT
              echo "Found $POSTS_COUNT new posts"
            else
              echo "has_new_posts=false" >> $GITHUB_OUTPUT
              echo "No new posts found"
            fi
          else
            echo "has_new_posts=false" >> $GITHUB_OUTPUT
            echo "No import summary found"
          fi

      - name: Build Hugo site
        if: steps.check_posts.outputs.has_new_posts == 'true'
        run: |
          hugo --minify --gc
          echo "Hugo build completed successfully"

      - name: Commit new posts
        if: steps.check_posts.outputs.has_new_posts == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add content/posts/*
          git add scripts/logs/medium_import_summary.json

          if ! git diff --cached --quiet; then
            POSTS_COUNT=$(jq '.posts_imported' scripts/logs/medium_import_summary.json)
            git commit -m "Add $POSTS_COUNT new posts from Medium (Dir: YYYYMM/UUID, Slug: UUID)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Create summary comment
        if: steps.check_posts.outputs.has_new_posts == 'true'
        run: |
          echo "## 📝 Medium記事インポート完了" >> $GITHUB_STEP_SUMMARY
          echo "ディレクトリ形式: YYYYMM/UUID, Slug形式: UUID" >> $GITHUB_STEP_SUMMARY
          echo "インポート日時: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "新規記事数: $(jq '.posts_imported' scripts/logs/medium_import_summary.json)" >> $GITHUB_STEP_SUMMARY
          echo "### インポートした記事:" >> $GITHUB_STEP_SUMMARY
          jq -r '.posts[] | "- **\(.title)** (Dir: `\(.directory)`, Slug: `\(.slug)`)"' scripts/logs/medium_import_summary.json >> $GITHUB_STEP_SUMMARY

      - name: No new posts message
        if: steps.check_posts.outputs.has_new_posts == 'false'
        run: |
          echo "## 📝 Medium記事チェック完了" >> $GITHUB_STEP_SUMMARY
          echo "新しい記事は見つかりませんでした。" >> $GITHUB_STEP_SUMMARY
